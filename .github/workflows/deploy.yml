name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      # Upload the built dist/ straight to the document root over SFTP.
      # No git clone on the server — the runner pushes files directly.
      - name: Deploy dist/ via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.gb.stackcp.com
          username: top10-heidelberg.de
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/sites/20a/9/9a9f6d1c7a/public_html/sufis-berlin.de"
          strip_components: 1
          overwrite: true
