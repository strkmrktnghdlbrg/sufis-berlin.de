name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      # Upload the built dist/ straight to the document root over a single
      # rsync-over-SSH connection. No git clone on the server, and avoids the
      # multi-connection handshake throttling that scp-action hit on StackCP.
      - name: Deploy dist/ via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: dist/
          remote_path: /home/sites/20a/9/9a9f6d1c7a/public_html/sufis-berlin.de/
          remote_host: ssh.gb.stackcp.com
          remote_user: top10-heidelberg.de
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
